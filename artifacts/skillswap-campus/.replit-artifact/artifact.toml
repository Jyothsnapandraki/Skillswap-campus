kind = "web"
previewPath = "/"
title = "SkillSwap Campus"
version = "1.0.0"
id = "artifacts/skillswap-campus"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25300

[services.development]
run = "pnpm --filter @workspace/skillswap-campus run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/skillswap-campus", "run", "build" ]
publicDir = "artifacts/skillswap-campus/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25300"
BASE_PATH = "/"
